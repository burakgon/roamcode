<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0c0e"/>
      <stop offset="1" stop-color="#08080a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.6">
      <stop offset="0" stop-color="#f77a44" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f77a44" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f99a5e"/>
      <stop offset="1" stop-color="#f4602a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e0e12"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </linearGradient>
    <clipPath id="phone"><rect x="12" y="12" width="256" height="424" rx="30"/></clipPath>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1279" height="639" fill="none" stroke="#1d1d22" stroke-width="1"/>

  <!-- LEFT: copy -->
  <g transform="translate(84, 150)">
    <!-- wordmark dot -->
    <circle cx="14" cy="-2" r="13" fill="url(#coral)"/>
    <text x="44" y="8" font-size="58" font-weight="800" fill="#f4f4f6" letter-spacing="-1">RoamCode</text>

    <text x="0" y="78" font-size="32" font-weight="600" fill="#e7e7ea">Run Claude Code or Codex from your phone.</text>
    <text x="0" y="120" font-size="22" fill="#9a9aa2">Self-hosted control plane. No RoamCode cloud relay.</text>
    <text x="0" y="150" font-size="22" fill="#9a9aa2">Provider CLIs use their normal service path.</text>

    <!-- flow -->
    <g transform="translate(0, 210)" font-size="20" font-weight="600">
      <text x="0" y="0" fill="#cfcfd4">📱 your phone</text>
      <text x="150" y="0" fill="#6a6a72">→</text>
      <text x="182" y="0" fill="#f99a5e">🔒 your machine</text>
      <text x="372" y="0" fill="#6a6a72">→</text>
      <text x="404" y="0" fill="#cfcfd4">🤖 claude / codex</text>
    </g>

    <!-- chips -->
    <g transform="translate(0, 268)" font-size="17" fill="#b8b8c0">
      <g><rect x="0" y="-22" width="150" height="34" rx="17" fill="#15151a" stroke="#26262d"/><text x="18" y="0">your CLI login</text></g>
      <g><rect x="162" y="-22" width="184" height="34" rx="17" fill="#15151a" stroke="#26262d"/><text x="180" y="0">control plane on host</text></g>
      <g><rect x="358" y="-22" width="142" height="34" rx="17" fill="#15151a" stroke="#26262d"/><text x="376" y="0">installable PWA</text></g>
      <g><rect x="0" y="22" width="96" height="34" rx="17" fill="#15151a" stroke="#26262d"/><text x="18" y="44">MIT</text></g>
      <g><rect x="108" y="22" width="250" height="34" rx="17" fill="#15151a" stroke="#26262d"/><text x="126" y="44">token-secured · open source</text></g>
    </g>
  </g>

  <!-- RIGHT: intentionally Claude-labelled terminal example + the mobile key bar -->
  <g transform="translate(905, 96)">
    <rect x="0" y="0" width="280" height="448" rx="40" fill="#000" stroke="#2a2a31" stroke-width="2"/>
    <rect x="12" y="12" width="256" height="424" rx="30" fill="url(#screen)"/>
    <g clip-path="url(#phone)" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
      <!-- notch -->
      <rect x="108" y="22" width="64" height="14" rx="7" fill="#000"/>
      <!-- header -->
      <text x="28" y="70" font-size="13" font-weight="700" fill="#e7e7ea"><tspan fill="#f4602a">&gt;_ </tspan>acme-api</text>
      <circle cx="244" cy="65" r="4" fill="#f4602a"/>
      <line x1="12" y1="82" x2="268" y2="82" stroke="#1e1e26"/>
      <!-- real claude transcript -->
      <g font-size="12.5">
        <text x="26" y="108"><tspan fill="#f99a5e">❯ </tspan><tspan fill="#cdd0d8">fix the /orders 500</tspan></text>
        <text x="26" y="132"><tspan fill="#f99a5e">⏺</tspan><tspan fill="#8a8a94"> Read(orders.ts)  ⎿ 84 lines</tspan></text>
        <text x="26" y="158"><tspan fill="#f99a5e">⏺</tspan><tspan fill="#cdd0d8"> guard was one line too</tspan></text>
        <text x="26" y="174"><tspan fill="#cdd0d8">  late — moved it up:</tspan></text>
        <text x="26" y="200"><tspan fill="#7bbd8a">+ if (!cart.items.length)</tspan></text>
        <text x="26" y="216"><tspan fill="#e0757e">- cart.items[0].price</tspan></text>
        <text x="26" y="242"><tspan fill="#f99a5e">⏺</tspan><tspan fill="#7bbd8a"> Tests  1 passed (1)</tspan></text>
        <text x="26" y="266"><tspan fill="#8a8a94">✻ Cooked for 2m 3s</tspan></text>
      </g>
      <!-- input box -->
      <rect x="26" y="292" width="228" height="30" rx="8" fill="#101015" stroke="#26262d"/>
      <text x="38" y="311" font-size="12" fill="#6a6a72">❯ commit this</text>
      <!-- mobile key bar (the touch-terminal signature) -->
      <rect x="12" y="386" width="256" height="50" fill="#0f0f13"/>
      <line x1="12" y1="386" x2="268" y2="386" stroke="#1e1e26"/>
      <rect x="22" y="398" width="42" height="27" rx="7" fill="#1b1b22" stroke="#2a2a33"/><text x="32" y="416" font-size="11.5" fill="#c8c8d0">Ctrl</text>
      <rect x="72" y="398" width="38" height="27" rx="7" fill="#1b1b22" stroke="#2a2a33"/><text x="81" y="416" font-size="11.5" fill="#c8c8d0">Esc</text>
      <rect x="118" y="398" width="34" height="27" rx="7" fill="#1b1b22" stroke="#2a2a33"/><text x="128" y="416" font-size="12" fill="#c8c8d0">⇥</text>
      <rect x="160" y="398" width="34" height="27" rx="7" fill="#1b1b22" stroke="#2a2a33"/><text x="171" y="416" font-size="12" fill="#c8c8d0">↑</text>
      <rect x="202" y="398" width="56" height="27" rx="7" fill="#1b1b22" stroke="#2a2a33"/><text x="224" y="417" font-size="14" fill="#c8c8d0">⌨</text>
    </g>
  </g>
</svg>
