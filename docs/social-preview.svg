<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0c0e"/>
      <stop offset="1" stop-color="#08080a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.28" r="0.6">
      <stop offset="0" stop-color="#f77a44" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f77a44" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f99a5e"/>
      <stop offset="1" stop-color="#f4602a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#131318"/>
      <stop offset="1" stop-color="#0d0d11"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1279" height="639" fill="none" stroke="#1d1d22" stroke-width="1"/>

  <!-- LEFT: copy -->
  <g transform="translate(84, 150)">
    <!-- wordmark dot -->
    <circle cx="14" cy="-2" r="13" fill="url(#coral)"/>
    <text x="44" y="8" font-size="58" font-weight="800" fill="#f4f4f6" letter-spacing="-1">Remote Coder</text>

    <text x="0" y="78" font-size="32" font-weight="600" fill="#e7e7ea">Run the real Claude Code from your phone.</text>
    <text x="0" y="120" font-size="22" fill="#9a9aa2">Self-hosted server + installable PWA that drives the actual</text>
    <text x="0" y="150" font-size="22" fill="#9a9aa2"><tspan font-family="monospace" fill="#cfcfd4">claude</tspan> CLI with your subscription — no API key.</text>

    <!-- flow -->
    <g transform="translate(0, 210)" font-size="20" font-weight="600">
      <text x="0" y="0" fill="#cfcfd4">📱 your phone</text>
      <text x="150" y="0" fill="#6a6a72">→</text>
      <text x="182" y="0" fill="#f99a5e">🔒 your machine</text>
      <text x="372" y="0" fill="#6a6a72">→</text>
      <text x="404" y="0" fill="#cfcfd4">🤖 claude CLI</text>
    </g>

    <!-- chips -->
    <g transform="translate(0, 268)" font-size="17" fill="#b8b8c0">
      <g><rect x="0" y="-22" width="150" height="34" rx="17" fill="#15151a" stroke="#26262d"/><text x="18" y="0">no API key</text></g>
      <g><rect x="162" y="-22" width="184" height="34" rx="17" fill="#15151a" stroke="#26262d"/><text x="180" y="0">your code stays put</text></g>
      <g><rect x="358" y="-22" width="142" height="34" rx="17" fill="#15151a" stroke="#26262d"/><text x="376" y="0">installable PWA</text></g>
      <g><rect x="0" y="22" width="96" height="34" rx="17" fill="#15151a" stroke="#26262d"/><text x="18" y="44">MIT</text></g>
      <g><rect x="108" y="22" width="250" height="34" rx="17" fill="#15151a" stroke="#26262d"/><text x="126" y="44">token-secured · open source</text></g>
    </g>
  </g>

  <!-- RIGHT: phone mockup -->
  <g transform="translate(905, 96)">
    <rect x="0" y="0" width="280" height="448" rx="40" fill="#000" stroke="#2a2a31" stroke-width="2"/>
    <rect x="12" y="12" width="256" height="424" rx="30" fill="url(#screen)"/>
    <!-- notch -->
    <rect x="108" y="22" width="64" height="14" rx="7" fill="#000"/>
    <!-- header -->
    <text x="32" y="74" font-size="15" font-weight="700" fill="#e7e7ea">remote-coder</text>
    <circle cx="244" cy="69" r="4" fill="#f4602a"/>
    <!-- assistant bubble -->
    <rect x="28" y="92" width="180" height="46" rx="12" fill="#17171d"/>
    <rect x="40" y="108" width="120" height="7" rx="3.5" fill="#3a3a44"/>
    <rect x="40" y="120" width="150" height="7" rx="3.5" fill="#2c2c34"/>
    <!-- code block -->
    <rect x="28" y="150" width="224" height="78" rx="10" fill="#0c0c10" stroke="#22222a"/>
    <rect x="40" y="166" width="70" height="6" rx="3" fill="#f99a5e"/>
    <rect x="40" y="182" width="150" height="6" rx="3" fill="#5a8acb"/>
    <rect x="40" y="196" width="120" height="6" rx="3" fill="#7bbd8a"/>
    <rect x="40" y="210" width="160" height="6" rx="3" fill="#3a3a44"/>
    <!-- user bubble -->
    <rect x="92" y="240" width="160" height="34" rx="12" fill="url(#coral)"/>
    <rect x="104" y="254" width="110" height="7" rx="3.5" fill="#7a2e10" opacity="0.5"/>
    <!-- permission card -->
    <rect x="28" y="286" width="224" height="66" rx="12" fill="#161118" stroke="#5a3a2a"/>
    <text x="42" y="308" font-size="12" font-weight="700" fill="#f4a06a">Permission needed</text>
    <rect x="42" y="320" width="90" height="22" rx="11" fill="#1f1f26"/><text x="58" y="335" font-size="11" fill="#c8c8d0">Deny</text>
    <rect x="142" y="320" width="96" height="22" rx="11" fill="url(#coral)"/><text x="160" y="335" font-size="11" font-weight="700" fill="#1a0e06">Allow</text>
    <!-- telemetry + composer -->
    <circle cx="38" cy="372" r="4" fill="#f4602a"/><text x="50" y="377" font-size="11" fill="#c8c8d0">Thinking…  · 134 tok</text>
    <rect x="28" y="392" width="224" height="32" rx="16" fill="#101015" stroke="#26262d"/>
    <text x="44" y="412" font-size="12" fill="#6a6a72">Message claude…</text>
    <circle cx="236" cy="408" r="11" fill="url(#coral)"/>
  </g>
</svg>
