# Smoke-test the one-command installer on a clean Ubuntu box — a broken
# `curl … | bash` on launch day is fatal, and installer bit-rot is silent
# (nothing else in CI exercises it). Runs weekly, on installer changes, and
# on demand; NOT part of the PR gate (network-dependent by design).
name: install-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC — catches bit-rot between releases
  push:
    branches: [main]
    paths:
      - scripts/install.sh
      - .github/workflows/install-smoke.yml

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Install tmux (required for terminal sessions)
        run: sudo apt-get update && sudo apt-get install -y tmux

      # A push validates this commit's bootstrap without depending on an npm release that may not
      # exist yet. Scheduled/manual runs validate the complete public path after publication.
      - name: Verify checkout installer delegates to npm (push)
        if: github.event_name == 'push'
        run: |
          mkdir -p "$RUNNER_TEMP/fake-bin"
          # The generated helper expands RUNNER_TEMP when it executes.
          # shellcheck disable=SC2016
          printf '%s\n' '#!/usr/bin/env bash' 'printf "%s\\n" "$@" > "$RUNNER_TEMP/npx-args"' > "$RUNNER_TEMP/fake-bin/npx"
          chmod +x "$RUNNER_TEMP/fake-bin/npx"
          PATH="$RUNNER_TEMP/fake-bin:$PATH" bash scripts/install.sh
          grep --fixed-strings --line-regexp -- '--yes' "$RUNNER_TEMP/npx-args"
          grep --fixed-strings --line-regexp -- '--allow-scripts=better-sqlite3,node-pty' "$RUNNER_TEMP/npx-args"
          grep --fixed-strings --line-regexp -- 'roamcode@latest' "$RUNNER_TEMP/npx-args"
          grep --fixed-strings --line-regexp -- 'install' "$RUNNER_TEMP/npx-args"

      - name: Run the public installer like a real user (schedule/manual)
        if: github.event_name != 'push'
        env:
          RC_NO_START: "1"
          ROAMCODE_INSTALL_ROOT: /home/runner/roamcode-smoke
          ROAMCODE_DATA_DIR: /home/runner/roamcode-smoke-data
        run: |
          set -o pipefail
          if ! curl -fsSL https://roamcode.ai/install | bash; then
            cat "$ROAMCODE_DATA_DIR/update.log" || true
            exit 1
          fi

      - name: Assert the install is actually usable
        if: github.event_name != 'push'
        run: |
          set -ex
          test -x /home/runner/roamcode-smoke/bin/roamcode
          test -L /home/runner/roamcode-smoke/current
          test -f /home/runner/roamcode-smoke/current/node_modules/roamcode/dist/index.js
          test -f /home/runner/roamcode-smoke/current/node_modules/@roamcode.ai/server/dist/start.js
          test -f /home/runner/roamcode-smoke/current/node_modules/@roamcode.ai/server/dist/health-watchdog.js
          test -d /home/runner/roamcode-smoke/current/node_modules/@roamcode.ai/web/dist
          /home/runner/roamcode-smoke/bin/roamcode --version
          /home/runner/roamcode-smoke/bin/roamcode --help | head -3
