name: npm legacy scope check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify legacy scope membership
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          USERNAME="$(npm whoami)"
          npm org ls roamcode --json > "$RUNNER_TEMP/roamcode-members.json"
          node -e '
            const fs = require("node:fs");
            const members = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (!Object.hasOwn(members, process.argv[2])) process.exit(1);
          ' "$RUNNER_TEMP/roamcode-members.json" "$USERNAME"
          echo "legacy npm scope membership confirmed"
