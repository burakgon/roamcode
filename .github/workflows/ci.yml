name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm approve-builds better-sqlite3 esbuild || true
          pnpm rebuild better-sqlite3 || true

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux && tmux -V

      - name: Verify native SQLite
        run: pnpm -C packages/server exec node -e "const D=require('better-sqlite3'); const db=new D(':memory:'); db.exec('create table t(x)'); db.prepare('insert into t values (1)').run(); if (db.prepare('select x from t').get().x !== 1) process.exit(1);"

      - name: Build
        run: pnpm build

      - name: Boot smoke
        run: |
          set -u
          test -f packages/server/dist/health-watchdog.js
          SMOKE_DIR="$(mktemp -d)"
          node packages/server/dist/start.js > "$SMOKE_DIR/boot.log" 2>&1 &
          SMOKE_PID=$!
          trap 'kill "$SMOKE_PID" >/dev/null 2>&1 || true; rm -rf "$SMOKE_DIR"' EXIT
          ok=0
          for _ in $(seq 1 60); do
            if ! kill -0 "$SMOKE_PID" >/dev/null 2>&1; then
              cat "$SMOKE_DIR/boot.log"
              exit 1
            fi
            if curl -fsS -m 2 "http://127.0.0.1:4399/health" >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 0.5
          done
          if [ "$ok" != "1" ]; then
            cat "$SMOKE_DIR/boot.log"
            exit 1
          fi
        env:
          PORT: "4399"
          BIND_ADDRESS: "127.0.0.1"
          ACCESS_TOKEN: ci-boot-smoke-token
          ROAMCODE_DATA_DIR: ${{ runner.temp }}/rc-boot-smoke

      - name: Exercise packed standalone runtime
        run: |
          set -euo pipefail
          VERSION="$(node -p 'require("./package.json").version')"
          PACK_DIR="$RUNNER_TEMP/packed-runtime"
          CONTAINER="roamcode-packed-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() {
            docker rm --force "$CONTAINER" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          mkdir -p "$PACK_DIR"
          pnpm --filter @roamcode.ai/web pack --pack-destination "$PACK_DIR" >/dev/null
          pnpm --filter @roamcode.ai/server pack --pack-destination "$PACK_DIR" >/dev/null
          pnpm -C packages/cli pack --pack-destination "$PACK_DIR" >/dev/null
          cp scripts/npm-install-policy.json "$PACK_DIR/package.json"
          cp scripts/packed-runtime-acceptance.mjs scripts/packed-runtime-container.sh "$PACK_DIR/"
          cp packages/server/test/fixtures/fake-claude.mjs packages/server/test/fixtures/fake-codex.mjs "$PACK_DIR/"
          docker run --rm --name "$CONTAINER" --cpus 2 --memory 4g \
            --env RC_ACCEPTANCE_VERSION="$VERSION" \
            --env RC_ACCEPTANCE_EXPECT_ARCH="$(node -p 'process.arch')" \
            --mount "type=bind,src=$PACK_DIR,dst=/artifacts,readonly" \
            node:24-bookworm-slim bash /artifacts/packed-runtime-container.sh

      - name: Typecheck
        run: |
          pnpm exec tsc -b --force
          pnpm -C packages/web typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: PWA artifact and performance gates
        run: pnpm --filter @roamcode.ai/web test:pwa-build

      - name: GitHub Actions workflow contracts
        run: |
          actionlint_version=1.7.7
          actionlint_archive="$RUNNER_TEMP/actionlint.tar.gz"
          actionlint_root="$RUNNER_TEMP/actionlint"
          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            --output "$actionlint_archive" \
            "https://github.com/rhysd/actionlint/releases/download/v${actionlint_version}/actionlint_${actionlint_version}_linux_amd64.tar.gz"
          printf '%s  %s\n' \
            '023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757' \
            "$actionlint_archive" | sha256sum --check
          mkdir -p "$actionlint_root"
          tar --extract --gzip --file "$actionlint_archive" --directory "$actionlint_root" actionlint
          "$actionlint_root/actionlint" -no-color

      - name: Audit dependencies
        run: pnpm audit --prod || true

      - name: Prepare exact stable package candidate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SOURCE_REVISION: ${{ github.sha }}
        run: |
          set -euo pipefail
          CANDIDATE_DIR="$RUNNER_TEMP/stable-candidate"
          VERSION="$(node -p 'require("./package.json").version')"
          mkdir -p "$CANDIDATE_DIR"
          cp "$RUNNER_TEMP/packed-runtime/roamcode.ai-web-${VERSION}.tgz" \
            "$RUNNER_TEMP/packed-runtime/roamcode.ai-server-${VERSION}.tgz" \
            "$RUNNER_TEMP/packed-runtime/roamcode-${VERSION}.tgz" \
            "$CANDIDATE_DIR/"
          (
            cd "$CANDIDATE_DIR"
            sha256sum -- *.tgz > SHA256SUMS
          )
          CANDIDATE_DIR="$CANDIDATE_DIR" VERSION="$VERSION" node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const manifest = {
            schemaVersion: 1,
            version: process.env.VERSION,
            sourceRevision: process.env.SOURCE_REVISION,
          };
          fs.writeFileSync(path.join(process.env.CANDIDATE_DIR, "candidate.json"), `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Attest exact stable package candidate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ runner.temp }}/stable-candidate/*.tgz

      - name: Preserve exact stable package candidate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stable-candidate-${{ github.sha }}
          path: ${{ runner.temp }}/stable-candidate
          if-no-files-found: error
          retention-days: 30

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install site dependencies
        run: pnpm --dir site install --frozen-lockfile

      - name: Test site
        run: pnpm --dir site test

      - name: Typecheck site
        run: pnpm --dir site typecheck

      - name: Build site
        run: pnpm --dir site build
