services:
  relay:
    build:
      context: ../..
      dockerfile: packaging/relay/Dockerfile
    image: ${ROAMCODE_RELAY_IMAGE:-roamcode-relay:local}
    restart: unless-stopped
    user: "10001:10001"
    environment:
      NODE_ENV: production
      ROAMCODE_RELAY_ROOT_TOKEN_FILE: /run/secrets/relay_root_token
      ROAMCODE_RELAY_ACCOUNTS_ENABLED: ${ROAMCODE_RELAY_ACCOUNTS_ENABLED:-1}
      ROAMCODE_RELAY_PREVIOUS_ROOT_TOKEN_DIR: /run/secrets/previous_root_tokens
      ROAMCODE_RELAY_ALLOWED_ORIGINS: ${ROAMCODE_RELAY_ALLOWED_ORIGINS:?set trusted PWA origins}
      ROAMCODE_RELAY_MAX_TOTAL_CONNECTIONS: ${ROAMCODE_RELAY_MAX_TOTAL_CONNECTIONS:-1024}
      ROAMCODE_RELAY_MAX_CONNECTIONS_PER_ROUTE: ${ROAMCODE_RELAY_MAX_CONNECTIONS_PER_ROUTE:-64}
      ROAMCODE_RELAY_MAX_BYTES_PER_MINUTE: ${ROAMCODE_RELAY_MAX_BYTES_PER_MINUTE:-67108864}
      ROAMCODE_RELAY_MAX_MESSAGES_PER_MINUTE: ${ROAMCODE_RELAY_MAX_MESSAGES_PER_MINUTE:-12000}
    volumes:
      - relay-data:/var/lib/roamcode-relay
      - ${ROAMCODE_RELAY_ROOT_TOKEN_FILE:?set a private container-owned root-token file}:/run/secrets/relay_root_token:ro
      - ${ROAMCODE_RELAY_PREVIOUS_ROOT_TOKEN_SOURCE:-./secrets/previous-root-tokens}:/run/secrets/previous_root_tokens:ro
    ports:
      - "127.0.0.1:4281:4281"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    pids_limit: 256
    mem_limit: 768m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "5"
    networks:
      - relay-internal

  edge:
    build:
      context: ../..
      dockerfile: packaging/relay/Edge.Dockerfile
    image: ${ROAMCODE_EDGE_IMAGE:-roamcode-edge:local}
    restart: unless-stopped
    user: "10002:10002"
    depends_on:
      relay:
        condition: service_healthy
    environment:
      ROAMCODE_APP_DOMAIN: ${ROAMCODE_APP_DOMAIN:?set the app DNS name}
      ROAMCODE_RELAY_DOMAIN: ${ROAMCODE_RELAY_DOMAIN:?set the relay DNS name}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    pids_limit: 128
    mem_limit: 256m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "5"
    networks:
      - relay-internal
      - edge

networks:
  relay-internal:
    internal: true
  edge:

volumes:
  relay-data:
  caddy-data:
  caddy-config:
